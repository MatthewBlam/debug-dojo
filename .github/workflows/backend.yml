name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Lint and typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Check for backend sources
        id: scaffold
        run: |
          if find . -type f -name "*.py" | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No backend Python sources found; skipping until DD-005 lands."
          fi

      - name: Install tooling
        if: steps.scaffold.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy

      - name: Install dependencies
        if: steps.scaffold.outputs.present == 'true'
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Lint and typecheck
        if: steps.scaffold.outputs.present == 'true'
        run: ruff check . && mypy .
